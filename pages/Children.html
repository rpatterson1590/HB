<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Children's Church Gallery | Heaven Bound Church of God</title>

  <style>
    :root {
      --blue-dark: #062946;
      --blue-main: #073b63;
      --blue-light: #0d5c8e;
      --white: #ffffff;
      --gold: #d8b35a;
      --soft-white: rgba(255, 255, 255, 0.86);
      --muted-white: rgba(255, 255, 255, 0.68);
      --glass: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.14);
      --shadow: rgba(0, 0, 0, 0.28);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(22, 105, 158, 0.55), transparent 35%),
        linear-gradient(135deg, var(--blue-dark), var(--blue-main), #021a31);
      color: var(--white);
      min-height: 100vh;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1120px, 92%);
      margin: auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(2, 26, 49, 0.88);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      gap: 24px;
      position: relative;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border: 3px solid var(--white);
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      left: 19px;
      top: -12px;
      width: 4px;
      height: 70px;
      background: var(--white);
      border-radius: 8px;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 17px;
      width: 31px;
      height: 4px;
      background: var(--white);
      border-radius: 8px;
    }

    .brand span {
      font-size: clamp(1rem, 2vw, 1.35rem);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 22px;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
    }

    nav a {
      color: var(--soft-white);
      transition: color 0.25s ease, background 0.25s ease;
      white-space: nowrap;
    }

    nav a:hover,
    nav a.active {
      color: var(--gold);
    }

    .menu-toggle {
      display: none;
      width: 44px;
